name: Linked Issue

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: linked-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check linked issue
        shell: bash
        run: |
          python - <<'PY'
          import json, os, re, sys

          with open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8') as handle:
              event = json.load(handle)

          pr = event['pull_request']
          title = (pr.get('title') or '').strip()
          body = pr.get('body') or ''
          author = ((pr.get('user') or {}).get('login') or '').strip()
          labels = {label.get('name') for label in pr.get('labels', []) if label.get('name')}
          text = '\n'.join(part for part in (title, body) if part)
          bot_authors = {'dependabot[bot]', 'renovate[bot]', 'github-actions[bot]'}

          if author in bot_authors:
              print(f"Skipping linked-issue enforcement for bot author '{author}'.")
              sys.exit(0)

          if 'no-linked-issue-required' in labels:
              print('Bypass label present.')
              sys.exit(0)

          has_issue_number = re.search(r'(?<![/\w])#\d+\b', text)
          has_issue_url = re.search(r'https://github\.com/[^/\s]+/[^/\s]+/issues/\d+\b', text)

          if has_issue_number or has_issue_url:
              print('Issue reference found.')
              sys.exit(0)

          print(
              "Missing linked issue reference. Add '#123', a GitHub issue URL, or the 'no-linked-issue-required' label.",
              file=sys.stderr,
          )
          sys.exit(1)
          PY
